name: CI

on:
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-targets --all-features

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  miri:
    name: Miri (Unsafe Code Verification)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri on core crates
        run: |
          cargo +nightly miri test -p php-rs-types 2>&1 || true
          cargo +nightly miri test -p php-rs-gc 2>&1 || true
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM (browser target)
        run: wasm-pack build crates/php-rs-sapi-wasm --target web --release
      - name: Check WASM binary size
        run: |
          WASM_SIZE=$(wc -c < pkg/php_rs_sapi_wasm_bg.wasm | tr -d ' ')
          echo "WASM binary size: $(( WASM_SIZE / 1024 ))KB"
          if [ "$WASM_SIZE" -gt 3145728 ]; then
            echo "::warning::WASM binary exceeds 3MB target ($WASM_SIZE bytes)"
          fi
      - name: Run WASM SAPI native tests
        run: cargo test -p php-rs-sapi-wasm

  sanitizer:
    name: Address Sanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Run ASan on php-rs-types (leak detection off — global intern pool is intentional)
        run: |
          RUSTFLAGS="-Z sanitizer=address" \
          cargo +nightly test --target x86_64-unknown-linux-gnu \
            -p php-rs-types
        env:
          ASAN_OPTIONS: "detect_leaks=0"
      - name: Run ASan on remaining crates (leak detection on)
        run: |
          RUSTFLAGS="-Z sanitizer=address" \
          cargo +nightly test --target x86_64-unknown-linux-gnu \
            -p php-rs-lexer -p php-rs-parser \
            -p php-rs-compiler -p php-rs-vm -p php-rs-gc
        env:
          ASAN_OPTIONS: "detect_leaks=1"
