<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>php.rs Playground</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #1e1e2e;
            color: #cdd6f4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #181825;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #313244;
        }
        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #89b4fa;
        }
        header h1 span { color: #f38ba8; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .version {
            font-size: 12px;
            color: #6c7086;
        }
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 240px;
            background: #181825;
            border-right: 1px solid #313244;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar h2 {
            font-size: 13px;
            padding: 12px 16px;
            color: #a6adc8;
            border-bottom: 1px solid #313244;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .file-item {
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-item:hover { background: #313244; }
        .file-item.active { background: #45475a; color: #89b4fa; }
        .file-actions {
            padding: 8px;
            border-top: 1px solid #313244;
        }
        .file-actions input {
            width: 100%;
            padding: 6px 8px;
            background: #313244;
            border: 1px solid #45475a;
            border-radius: 4px;
            color: #cdd6f4;
            font-size: 12px;
            outline: none;
        }
        .file-actions input:focus { border-color: #89b4fa; }
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #181825;
            border-bottom: 1px solid #313244;
        }
        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-run {
            background: #a6e3a1;
            color: #1e1e2e;
        }
        .btn-run:hover { background: #94e2d5; }
        .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            background: #45475a;
            color: #cdd6f4;
        }
        .btn-secondary:hover { background: #585b70; }
        select {
            padding: 6px 8px;
            background: #313244;
            border: 1px solid #45475a;
            border-radius: 4px;
            color: #cdd6f4;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }
        select:focus { border-color: #89b4fa; }
        .status {
            font-size: 12px;
            color: #6c7086;
            margin-left: auto;
        }
        .status.ready { color: #a6e3a1; }
        .status.error { color: #f38ba8; }
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .code-container {
            flex: 1;
            position: relative;
        }
        textarea {
            width: 100%;
            height: 100%;
            padding: 16px;
            background: #1e1e2e;
            color: #cdd6f4;
            border: none;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 4;
        }
        .output-panel {
            height: 40%;
            border-top: 2px solid #313244;
            display: flex;
            flex-direction: column;
        }
        .output-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: #181825;
            font-size: 13px;
            color: #a6adc8;
        }
        .output-tab {
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .output-tab.active { background: #45475a; color: #cdd6f4; }
        .output-content {
            flex: 1;
            overflow: auto;
            padding: 16px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .output-content.error-output { color: #f38ba8; }
        .error-line-info {
            padding: 4px 16px;
            background: rgba(243, 139, 168, 0.1);
            border-left: 3px solid #f38ba8;
            font-size: 12px;
            color: #f38ba8;
            font-family: 'JetBrains Mono', monospace;
        }
        .timing {
            font-size: 11px;
            color: #6c7086;
            margin-left: auto;
        }
        .share-toast {
            position: fixed;
            top: 16px;
            right: 16px;
            background: #a6e3a1;
            color: #1e1e2e;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
        .share-toast.visible { opacity: 1; }
    </style>
</head>
<body>
    <header>
        <h1>php<span>.rs</span> Playground</h1>
        <div class="header-right">
            <span class="version" id="php-version">Loading...</span>
        </div>
    </header>
    <div class="main">
        <div class="sidebar">
            <h2>Files</h2>
            <div class="file-list" id="file-list"></div>
            <div class="file-actions">
                <input type="text" id="new-file" placeholder="New file (Enter to create)" />
            </div>
        </div>
        <div class="editor-panel">
            <div class="toolbar">
                <button class="btn btn-run" id="run-btn" disabled>Run (Ctrl+Enter)</button>
                <button class="btn btn-secondary" id="clear-btn">Clear</button>
                <button class="btn btn-secondary" id="share-btn">Share</button>
                <select id="examples">
                    <option value="">Examples...</option>
                    <option value="hello">Hello World</option>
                    <option value="fibonacci">Fibonacci</option>
                    <option value="classes">Classes &amp; OOP</option>
                    <option value="generators">Generators</option>
                    <option value="closures">Closures</option>
                    <option value="match">Match Expression</option>
                    <option value="fibers">Fibers</option>
                    <option value="enums">Enums</option>
                </select>
                <span class="status" id="status">Initializing...</span>
            </div>
            <div class="editor-area">
                <div class="code-container">
                    <textarea id="editor" spellcheck="false"></textarea>
                </div>
                <div class="output-panel">
                    <div class="output-header">
                        <span class="output-tab active" data-tab="output">Output</span>
                        <span class="output-tab" data-tab="tokens">Tokens</span>
                        <span class="output-tab" data-tab="ast">AST</span>
                        <span class="timing" id="timing"></span>
                    </div>
                    <div class="output-content" id="output"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="share-toast" id="share-toast">Link copied to clipboard!</div>

    <script type="module">
        import init, { PhpWasm } from '../../pkg/php_rs_sapi_wasm.js';

        const EXAMPLES = {
            hello: `<?php
echo "Hello from php.rs!\\n";

$name = "World";
echo "Hello, $name!\\n";

// Arrays
$numbers = [1, 2, 3, 4, 5];
echo "Count: " . count($numbers) . "\\n";
echo "Sum: " . array_sum($numbers) . "\\n";

// String functions
echo strtoupper("php running in your browser") . "\\n";

// Classes
class Greeter {
    private string $greeting;

    public function __construct(string $greeting) {
        $this->greeting = $greeting;
    }

    public function greet(string $name): string {
        return "$this->greeting, $name!";
    }
}

$greeter = new Greeter("Welcome");
echo $greeter->greet("Developer") . "\\n";
`,
            fibonacci: `<?php
function fibonacci(int $n): array {
    $fib = [0, 1];
    for ($i = 2; $i < $n; $i++) {
        $fib[$i] = $fib[$i - 1] + $fib[$i - 2];
    }
    return $fib;
}

$sequence = fibonacci(20);
echo "First 20 Fibonacci numbers:\\n";
echo implode(', ', $sequence) . "\\n";

// Recursive version
function fib_recursive(int $n): int {
    if ($n <= 1) return $n;
    return fib_recursive($n - 1) + fib_recursive($n - 2);
}

echo "\\nfib(10) = " . fib_recursive(10) . "\\n";
echo "fib(15) = " . fib_recursive(15) . "\\n";
`,
            classes: `<?php
interface Shape {
    public function area(): float;
    public function describe(): string;
}

class Circle implements Shape {
    public function __construct(
        private float $radius
    ) {}

    public function area(): float {
        return M_PI * $this->radius ** 2;
    }

    public function describe(): string {
        return "Circle(r={$this->radius})";
    }
}

class Rectangle implements Shape {
    public function __construct(
        private float $width,
        private float $height
    ) {}

    public function area(): float {
        return $this->width * $this->height;
    }

    public function describe(): string {
        return "Rectangle({$this->width}x{$this->height})";
    }
}

$shapes = [
    new Circle(5),
    new Rectangle(4, 6),
    new Circle(3),
    new Rectangle(10, 2),
];

foreach ($shapes as $shape) {
    printf("%-25s area = %.2f\\n", $shape->describe(), $shape->area());
}

$total = array_sum(array_map(fn(Shape $s) => $s->area(), $shapes));
printf("\\nTotal area: %.2f\\n", $total);
`,
            generators: `<?php
function range_gen(int $start, int $end, int $step = 1): Generator {
    for ($i = $start; $i <= $end; $i += $step) {
        yield $i;
    }
}

echo "Even numbers 0-20:\\n";
foreach (range_gen(0, 20, 2) as $n) {
    echo "$n ";
}
echo "\\n\\n";

// Infinite Fibonacci generator
function fibonacci(): Generator {
    [$a, $b] = [0, 1];
    while (true) {
        yield $a;
        [$a, $b] = [$b, $a + $b];
    }
}

echo "First 15 Fibonacci numbers:\\n";
$count = 0;
foreach (fibonacci() as $fib) {
    echo "$fib ";
    if (++$count >= 15) break;
}
echo "\\n";
`,
            closures: `<?php
// Basic closure
$greet = function(string $name): string {
    return "Hello, $name!";
};
echo $greet("World") . "\\n";

// Closure with use
$prefix = "PHP";
$format = function(string $msg) use ($prefix): string {
    return "[$prefix] $msg";
};
echo $format("Running in WASM") . "\\n";

// Arrow functions
$numbers = [1, 2, 3, 4, 5];
$doubled = array_map(fn($n) => $n * 2, $numbers);
echo "Doubled: " . implode(', ', $doubled) . "\\n";

$evens = array_filter($numbers, fn($n) => $n % 2 === 0);
echo "Evens: " . implode(', ', $evens) . "\\n";

// Higher-order functions
function compose(callable ...$fns): Closure {
    return function($x) use ($fns) {
        foreach (array_reverse($fns) as $fn) {
            $x = $fn($x);
        }
        return $x;
    };
}

$transform = compose(
    fn($s) => strtoupper($s),
    fn($s) => trim($s),
    fn($s) => str_replace('world', 'PHP', $s)
);

echo $transform("  hello world  ") . "\\n";
`,
            match: `<?php
function http_status(int $code): string {
    return match(true) {
        $code >= 500 => 'Server Error',
        $code >= 400 => 'Client Error',
        $code >= 300 => 'Redirect',
        $code >= 200 => 'Success',
        $code >= 100 => 'Informational',
        default => 'Unknown',
    };
}

$codes = [200, 301, 404, 500, 201, 403, 503];
foreach ($codes as $code) {
    echo "$code => " . http_status($code) . "\\n";
}

// Match with enum-like pattern
$day = 'Monday';
$type = match($day) {
    'Saturday', 'Sunday' => 'Weekend',
    default => 'Weekday',
};
echo "\\n$day is a $type\\n";
`,
            fibers: `<?php
$fiber = new Fiber(function(): void {
    $value = Fiber::suspend('first');
    echo "Got: $value\\n";

    $value = Fiber::suspend('second');
    echo "Got: $value\\n";
});

$result = $fiber->start();
echo "Fiber yielded: $result\\n";

$result = $fiber->resume('hello');
echo "Fiber yielded: $result\\n";

$fiber->resume('world');
echo "Fiber finished\\n";
`,
            enums: `<?php
enum Suit: string {
    case Hearts = 'H';
    case Diamonds = 'D';
    case Clubs = 'C';
    case Spades = 'S';

    public function color(): string {
        return match($this) {
            self::Hearts, self::Diamonds => 'Red',
            self::Clubs, self::Spades => 'Black',
        };
    }
}

foreach (Suit::cases() as $suit) {
    echo "{$suit->name} ({$suit->value}) => {$suit->color()}\\n";
}

echo "\\nFrom value: " . Suit::from('H')->name . "\\n";
`,
        };

        let php = null;
        let activeTab = 'output';

        const editor = document.getElementById('editor');
        const output = document.getElementById('output');
        const runBtn = document.getElementById('run-btn');
        const clearBtn = document.getElementById('clear-btn');
        const shareBtn = document.getElementById('share-btn');
        const examplesSelect = document.getElementById('examples');
        const status = document.getElementById('status');
        const timing = document.getElementById('timing');
        const fileList = document.getElementById('file-list');
        const newFileInput = document.getElementById('new-file');
        const versionEl = document.getElementById('php-version');
        const shareToast = document.getElementById('share-toast');

        // Load code from URL hash
        function loadFromHash() {
            const hash = window.location.hash;
            if (hash.startsWith('#code=')) {
                try {
                    return atob(hash.substring(6));
                } catch (e) {}
            }
            return null;
        }

        async function initialize() {
            try {
                await init();
                php = new PhpWasm();
                versionEl.textContent = `PHP ${php.php_version()} (php.rs WASM)`;
                runBtn.disabled = false;
                status.textContent = 'Ready';
                status.className = 'status ready';

                // Load from URL hash or default example
                const hashCode = loadFromHash();
                editor.value = hashCode || EXAMPLES.hello;

                updateFileList();
            } catch (e) {
                status.textContent = 'Failed to load';
                status.className = 'status error';
                output.textContent = `Initialization error: ${e}`;
                output.className = 'output-content error-output';
            }
        }

        function clearErrorHighlight() {
            const existing = document.querySelector('.error-line-info');
            if (existing) existing.remove();
        }

        function showErrorLine(message) {
            clearErrorHighlight();
            // Try to extract line number from error message
            const lineMatch = message.match(/line\s+(\d+)/i) ||
                              message.match(/on line (\d+)/i) ||
                              message.match(/Line (\d+)/);
            if (lineMatch) {
                const lineNum = parseInt(lineMatch[1], 10);
                const info = document.createElement('div');
                info.className = 'error-line-info';
                info.textContent = `Error on line ${lineNum}`;
                const codeContainer = document.querySelector('.code-container');
                codeContainer.parentNode.insertBefore(info, codeContainer.nextSibling);

                // Scroll editor to the error line
                const lines = editor.value.split('\n');
                let charPos = 0;
                for (let i = 0; i < Math.min(lineNum - 1, lines.length); i++) {
                    charPos += lines[i].length + 1;
                }
                editor.setSelectionRange(charPos, charPos + (lines[lineNum - 1]?.length || 0));
                editor.focus();
            }
        }

        function run() {
            if (!php) return;
            clearErrorHighlight();
            const code = editor.value;
            const start = performance.now();

            try {
                let result;
                if (activeTab === 'tokens') {
                    result = php.tokenize(code);
                    result = JSON.stringify(JSON.parse(result), null, 2);
                } else if (activeTab === 'ast') {
                    result = php.parse(code);
                    // Pretty-print JSON AST
                    try {
                        result = JSON.stringify(JSON.parse(result), null, 2);
                    } catch (e) {}
                } else {
                    result = php.eval(code);
                }

                const elapsed = (performance.now() - start).toFixed(1);
                timing.textContent = `${elapsed}ms`;
                output.textContent = result;
                output.className = 'output-content';
            } catch (e) {
                const elapsed = (performance.now() - start).toFixed(1);
                timing.textContent = `${elapsed}ms`;
                const errMsg = `${e}`;
                output.textContent = `Error: ${errMsg}`;
                output.className = 'output-content error-output';
                showErrorLine(errMsg);
            }

            php.reset();
            updateFileList();
        }

        function share() {
            const code = editor.value;
            const encoded = btoa(code);
            const url = `${window.location.origin}${window.location.pathname}#code=${encoded}`;
            navigator.clipboard.writeText(url).then(() => {
                shareToast.classList.add('visible');
                setTimeout(() => shareToast.classList.remove('visible'), 2000);
            }).catch(() => {
                // Fallback: update URL
                window.location.hash = `code=${encoded}`;
            });
        }

        function updateFileList() {
            if (!php) return;
            fileList.innerHTML = '';
            try {
                const entries = JSON.parse(php.list_dir('/'));
                for (const entry of entries) {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.textContent = entry;
                    item.addEventListener('click', () => {
                        try {
                            const data = php.read_file('/' + entry);
                            const text = new TextDecoder().decode(new Uint8Array(data));
                            editor.value = text;
                        } catch (e) {
                            output.textContent = `Error reading file: ${e}`;
                        }
                    });
                    fileList.appendChild(item);
                }
            } catch (e) {}
        }

        // Event listeners
        runBtn.addEventListener('click', run);
        clearBtn.addEventListener('click', () => {
            output.textContent = '';
            output.className = 'output-content';
            timing.textContent = '';
        });
        shareBtn.addEventListener('click', share);

        examplesSelect.addEventListener('change', () => {
            const key = examplesSelect.value;
            if (key && EXAMPLES[key]) {
                editor.value = EXAMPLES[key];
                examplesSelect.value = '';
            }
        });

        editor.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                run();
            }
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
            }
        });

        newFileInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && newFileInput.value.trim()) {
                const path = '/' + newFileInput.value.trim();
                try {
                    php.write_file(path, new TextEncoder().encode('<?php\n'));
                    newFileInput.value = '';
                    updateFileList();
                } catch (err) {
                    output.textContent = `Error creating file: ${err}`;
                }
            }
        });

        document.querySelectorAll('.output-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.output-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeTab = tab.dataset.tab;
            });
        });

        // Handle hash changes (back/forward navigation)
        window.addEventListener('hashchange', () => {
            const code = loadFromHash();
            if (code) editor.value = code;
        });

        initialize();
    </script>
</body>
</html>
